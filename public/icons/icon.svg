<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trove">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9c451"/>
      <stop offset="0.55" stop-color="#ed8c0f"/>
      <stop offset="1" stop-color="#ad520d"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6ab2b"/>
      <stop offset="1" stop-color="#d2700a"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.25" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- jar body shape, reused as a clip for the contents fill -->
    <clipPath id="jarClip">
      <path d="M150 206 q0 -34 34 -34 h144 q34 0 34 34 v150 q0 50 -50 50 h-112 q-50 0 -50 -50 z"/>
    </clipPath>
  </defs>

  <!-- Full-bleed background keeps the icon safe for maskable -->
  <rect width="512" height="512" rx="0" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#sheen)"/>

  <!-- Lid -->
  <rect x="176" y="118" width="160" height="48" rx="16" fill="#ffffff"/>
  <!-- Neck -->
  <rect x="196" y="158" width="120" height="22" rx="8" fill="#ffffff" opacity="0.92"/>

  <!-- Jar body -->
  <path d="M150 206 q0 -34 34 -34 h144 q34 0 34 34 v150 q0 50 -50 50 h-112 q-50 0 -50 -50 z" fill="#ffffff"/>

  <!-- Contents: a "fill level" that says 'in stock' -->
  <g clip-path="url(#jarClip)">
    <path d="M150 296 q26 -20 53 0 t53 0 t53 0 t53 0 v120 h-265 z" fill="url(#fill)"/>
    <circle cx="206" cy="344" r="9" fill="#ffffff" opacity="0.55"/>
    <circle cx="262" cy="372" r="7" fill="#ffffff" opacity="0.45"/>
    <circle cx="306" cy="340" r="8" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Soft inner edge on the jar -->
  <path d="M150 206 q0 -34 34 -34 h144 q34 0 34 34 v150 q0 50 -50 50 h-112 q-50 0 -50 -50 z"
        fill="none" stroke="#000000" stroke-opacity="0.05" stroke-width="2"/>
</svg>
